# Two-gross [[288,12,18]] memory, all 3 techniques. Construction matches Bravyi et al.
# arXiv:2308.07915 Table 3 (A = x^3+y^2+y^7, B = y^3+x+x^2); n=288/k=12 verified.
# Budgets tuned from a sizing probe: N_expanded=542,592 (3x BB(12)), q_base=1.33e-4, 2736 sector
# detectors; the single-sector failure onset is detectable around w~110 (f rises 0.003->0.20 over
# w=110..160), with the dominant binomial mass reaching the failure region only at p>~3.5e-3.
label: bb288_memory
code_name: bb288
experiment: memory
decoder_name: relay
techniques: [II, IS, I, III]
split_method: multiseed

p_ref: 0.002
p_lo: 3.0e-4
p_hi: 4.0e-3
ansatz_model: f5

# Relay-BP (same family as BB(12); the 288 DEM is ~3x larger so each decode is heavier).
relay_gamma0: 0.125
relay_pre_iter: 80
relay_num_sets: 100
relay_set_max_iter: 60
relay_stop_nconv: 6

# Technique II — D=18 is EVEN, so IF the circuit fault distance is even and weight-D circuit
# logicals are found, Proposition 1 gives an exact f0 onset pin for the ansatz (unlike BB(12)'s odd
# circuit distance). This BP-OSD min-weight search at d~18 over 12 logicals is the slowest step;
# drop "II" from techniques to skip it.
# The paper found BB(18)'s weight-18 logicals ONLY with DECIMATION (10^4 instances -> 7 logicals;
# without it, none), paired with a 2-QEC-cycle FAULT RESTRICTION (search a rounds=2 circuit, not
# rounds=18) + automorphisms. Both are enabled here (mw_decimate + mw_search_rounds=2). The reduced
# circuit makes the search tractable; its weight-D logicals are valid for the full circuit.
mw_workers: 24
mw_systematic: true
mw_decimate: true
mw_decimate_max_odd: 3
mw_search_rounds: 2

# Technique I / IS — explicit weight plan (2026-07-13): CONTIGUOUS head 106..130 (stride 1)
# through the rising onset, then 134..202 stride 4 through the mass at p_hi (mu~150, w_hi~200).
# Rationale: a strided-only plan has no contiguous head, which invalidates binomially-reweighted
# point values at low p (stride-gap undercount, ~stride x at high p; see K=4 fill_spectrum note)
# and starves the onset bins that decide marginal-Lambda shares. The old [70,205] stride-4 plan's
# sub-onset bins (70..102) are dropped: Technique II's even-D f0 pin anchors the ansatz below the
# head exactly. Adaptive 'hit N failures', high->low; shots_max bounded (the 288 decode is heavy).
# adaptive_failures 10->15: budget floor; noise-limited shares get a W4 boost pass (new config,
# explicit onset weights, seed 43, pooled downstream — in-place raises DO NOT rerun done weights).
weights: [106, 107, 108, 109, 110, 111, 112, 113, 114, 115, 116, 117, 118, 119, 120,
          121, 122, 123, 124, 125, 126, 127, 128, 129, 130,
          134, 138, 142, 146, 150, 154, 158, 162, 166, 170, 174, 178, 182, 186, 190,
          194, 198, 202]
weights_explicit: true
adaptive: true
adaptive_failures: 15
adaptive_shots_min: 4
adaptive_shots_max: 100000

# Technique III — multi-seeded splitting. At N_exp=542k single-flip mixing is even slower than BB(12)
# and the estimate under-shoots deep sub-threshold (docs/bb144_splitting_vs_is.md). STRICTLY a
# cross-check; trust the IS ansatz for the absolute LER. Very expensive — drop "III" to skip.
split_p_high: 0.006
split_p_low: 0.002
split_L: 12
split_M: 3
split_T_init: 2000000
split_ladder: eq18
