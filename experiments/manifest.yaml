# Experiment matrix for the SLURM array. Array index i -> configs[i].path.
# experiments/slurm/submit.sh sizes --array=0-(N-1) from len(configs).
# Each entry is an independent, checkpoint-resumable job writing to its own runs/ dir.
#
# P0 (run tomorrow): bb6_memory, bb144_memory. Uncomment the seams when ready.
configs:
  - path: experiments/configs/bb6_memory.yaml
    cpus: 16
    time: "08:00:00"
  - path: experiments/configs/bb144_memory.yaml
    cpus: 32
    time: "48:00:00"
  # Two-gross [[288,12,18]] memory — 3x larger than BB(12); heavy (esp. Technique II at d~18).
  - path: experiments/configs/bb288_memory.yaml
    cpus: 48
    time: "96:00:00"

